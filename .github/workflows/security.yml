name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      # v3.93.6 - https://github.com/trufflesecurity/trufflehog/releases/tag/v3.93.6
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea
        with:
          extra_args: --results=verified,unknown

  osv-scanner:
    name: OSV Scanner (dependency vulns)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # v2.3.8 - https://github.com/google/osv-scanner-action/releases/tag/v2.3.8
      # GitHub's dependency-review-action needs Advanced Security on private
      # repos. OSV-Scanner (Google) does the same lockfile vuln scan locally
      # against the OSV.dev database, no Advanced Security required.
      - name: Run OSV Scanner
        uses: google/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2
        with:
          scan-args: |-
            --lockfile=yarn.lock
            --fail-on-vuln
